<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickBooks OAuth Demo</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 10px; margin: 10px 0; width: 250px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #2ca01c; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #238317; }
        .status { margin-top: 20px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>QuickBooks Connect</h1>
        <p>Enter a User ID to start the connection</p>
        <input type="text" id="userId" value="USER_123">
        <br>
        <button onclick="connect()">Connect to QuickBooks</button>
        <div id="status" class="status"></div>
    </div>

    <script>
        function connect() {
            const userId = document.getElementById('userId').value;
            if (!userId) {
                alert('Please enter a User ID');
                return;
            }
            window.location.href = `/auth/connect?userId=${encodeURIComponent(userId)}`;
        }
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('success')) {
            document.getElementById('status').innerText = 'Tokens stored successfully in both databases!';
            document.getElementById('status').style.color = 'green';
        }
    </script>
</body>
</html>
