<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Employee List</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
      <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600&display=swap" rel="stylesheet">
      <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
   </head>
   <body style="font-family: Mulish, sans-serif;">
      <div class="container mt-4">
         <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="fw-semibold" style="font-size:22px;">Employee List</h2>
            <input type="text" class="form-control w-25" id="searchInput" placeholder="Search employee"/>
         </div>
         <table class="table table-bordered table-striped align-middle" id="employeeTable">
            <thead class="table-light">
               <tr>
                  <th>#</th>
                  <th>Name</th>
                  <th>Department</th>
                  <th>Email</th>
                  <th>Phone Number</th>
                  <th>Gender</th>
                  <th>Details</th>
               </tr>
            </thead>
            <tbody></tbody>
         </table>
         <nav>
            <ul class="pagination justify-content-center" id="pagination"></ul>
         </nav>
      </div>
      
      <div class="modal fade" id="employeeModal">
         <div class="modal-dialog modal-lg">
            <div class="modal-content">
               <div class="modal-header">
                  <h5 class="modal-title">Employee Details</h5>
                  <button class="btn-close" data-bs-dismiss="modal"></button>
               </div>
               <div class="modal-body" id="modalBody"></div>
            </div>
         </div>
      </div>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
      <script src="script.js"></script>
   </body>
</html>
